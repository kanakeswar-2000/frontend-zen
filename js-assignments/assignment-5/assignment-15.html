<!DOCTYPE html>
<html>

    <head>

    </head>

    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let year = parseInt(prompt("Enter the year:"));

            alert(isLeapYear(year));


            function isLeapYear(year) {

                if (year % 4 == 0) {
                    if (year % 100 == 0) {
                        if (year % 400 == 0) {
                            return 'Leap year';
                        }
                        else {
                            return 'not a leap year';
                        }
                    }
                    else {
                        return 'Leap year';
                    }
                }
                else {
                    return 'not a leap year';
                }

            }
        </script>

    </body>

</html>
