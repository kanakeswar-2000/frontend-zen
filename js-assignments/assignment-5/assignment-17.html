<!DOCTYPE html>
<html>

    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let num = parseInt(prompt("Enter the num:"));

            alert(factorsOfANumber(num));


            function factorsOfANumber(num) {

                let factors = [];
                let dup_num = num;

                while (num > 0) {
                    if (dup_num % num == 0) {
                        factors.push(num);
                    }
                    num -= 1;
                }
                console.log(factors);
                return factors;

            }
        </script>

    </body>

</html>
