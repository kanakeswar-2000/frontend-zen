    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let num_array = [12, 19, 2, 25, 9, 1];

            alert(countNumberOfOddNumbers(num_array));


            function countNumberOfOddNumbers(num_array) {
                let count = 0;
                num_array.forEach(num => { num % 2 == 0 ? count : count++ })
                return count;
            }
        </script>

    </body>
