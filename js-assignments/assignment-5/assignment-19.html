    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let num_array = [12, 19, 2, 25, 9, 1];

            alert(getLargestNumberFromArray(num_array));


            function getLargestNumberFromArray(num_array) {
                let max = num_array[0];
                num_array.forEach(num => { num < max ? max : (max = num) })
                return max;
            }
        </script>
