    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let num_array = [12, 19, 2, 25, 9, 1];

            alert(sumOfElements(num_array));


            function sumOfElements(num_array) {
                let sum = 0;
                num_array.forEach(num => { sum += num });
                return sum;
            }
        </script>
