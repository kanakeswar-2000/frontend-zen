    <body id="console-root">
        <script src="https://tap.ibhubs.in/utils/console.js"></script>

        <script>
            let n1 = parseInt(prompt());

            alert(countNumberOfDigits(n1));


            function countNumberOfDigits(num) {

                let count = 0;
                if (num == 0) {
                    return 1;
                }
                else if (num < 0) {
                    num = Math.abs(num);
                }
                while (num >= 1) {

                    num = num / 10;
                    console.log(num);
                    count += 1;
                }
                return count;

            }
        </script>

    </body>
