<!DOCTYPE html>
<html>

    <head>
        <script>
            let input = null;

            alert(getType(typeof input));

            function getType(input) {

                switch (input) {
                    case 'number':
                        return "Type is Number";
                    case 'string':
                        return "Type is String";
                    case 'boolean':
                        return "Type is Boolean";
                    case 'object':
                        return "Type is Object";
                    case 'undefined':
                        return 'Type is undefined'
                }
            }
        </script>
    </head>

</html>
